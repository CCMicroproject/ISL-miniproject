<!-- login.html -->

{% extends "base.html" %}
{% block content %}

<div class="center-box text-center">

<h2 class="mb-4">🔐 Secure Login</h2>

<form action="/login" method="post">
<input class="form-control mb-3" name="username" placeholder="Username">
<input class="form-control mb-3" type="password" name="password" placeholder="Password">
<button class="btn btn-primary w-100">Login Securely</button>
</form>

<hr class="my-4 text-light">

<h5 class="mb-3">Login Using Email</h5>

<form action="/email-login" method="post">
<input class="form-control mb-3" type="email" name="email" placeholder="Enter Email" required>
<button class="btn btn-success w-100">Send OTP to Email</button>
</form>

<p class="mt-3 text-secondary">Protected with MFA Authentication</p>

</div>

{% endblock %}
